version: "3.9"

services:
  db:
    image: postgres:16
    container_name: leadgen_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: leadgen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - leadgen_pgdata:/var/lib/postgresql/data

volumes:
  leadgen_pgdata:
